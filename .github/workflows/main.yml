name: CI Pipeline

on:
push:
branches: [ "main" ]

jobs:
test-build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Code
    uses: actions/checkout@v3

  # FRONTEND
  - name: Install Frontend
    run: |
      cd frontend
      npm install

  - name: Build Frontend
    run: |
      cd frontend
      npm run build

  # BACKEND
  - name: Install Backend
    run: |
      cd backend
      npm install

  - name: Run Backend
    run: |
      cd backend
      echo "Backend Ready"
```
